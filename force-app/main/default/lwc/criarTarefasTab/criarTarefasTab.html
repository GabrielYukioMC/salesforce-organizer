<template>
    <lightning-card title="➕ Criar Nova Task"  >
        <div class="container">

            <lightning-input
                label="Nome da Task"
                placeholder="Ex: Ajustar tela de login"
                value={novaTask.Name}
                data-field="Name"
                onchange={handleChange}
                required
            ></lightning-input>

           <!-- Rich Text (negrito, itálico, listas, etc) -->
            <lightning-input-rich-text
                label="Descrição"
                value={novaTask.Descricao__c}
                data-field="Descricao__c"
                onchange={handleChange}
                formats={formatosPermitidos}
            >
            </lightning-input-rich-text>


            <div class="grid">
                <lightning-combobox
                    label="Prioridade"
                    placeholder="Selecione"
                    value={novaTask.Prioridade__c}
                    options={prioridades}
                    data-field="Prioridade__c"
                    onchange={handleChange}
                    required
                ></lightning-combobox>

                <lightning-combobox
                    label="Tipo"
                    placeholder="Selecione"
                    value={novaTask.TipoTarefa__c}
                    options={tipos}
                    data-field="TipoTarefa__c"
                    onchange={handleChange}
                ></lightning-combobox>

                <lightning-combobox
                    label="Status"
                    placeholder="Selecione"
                    value={novaTask.Status__c}
                    options={statusOptions}
                    data-field="Status__c"
                    onchange={handleChange}
                ></lightning-combobox>
            </div>

            
           <div class="prazo-wrapper">
                <lightning-input
                    type="datetime-local"
                    label="Prazo de entrega"
                    placeholder="Selecione a data e hora do prazo"
                    value={novaTask.CloseDate__c}
                    data-field="CloseDate__c"
                    onchange={handleChange}
                ></lightning-input>

                <template if:true={prazoMensagem}>
                    <span class={prazoClasse}>
                        {prazoMensagem}
                    </span>
                </template>
            </div>


            <div class="recorrencia-wrapper">
                <lightning-input
                    type="toggle"
                    label="Tarefa Recorrente"
                    checked={novaTask.Recorrente__c}
                    onchange={handleToggleRecorrente}
                ></lightning-input>

                <template if:true={novaTask.Recorrente__c}>
                    <lightning-combobox
                        label="Frequência"
                        value={novaTask.FrequenciaTarefa__c}
                        options={opcoesFrequencia}
                        data-field="FrequenciaTarefa__c"
                        onchange={handleChange}
                    ></lightning-combobox>
                </template>
            </div>

            <div class="actions">
                <lightning-button
                    label="Limpar"
                    variant="neutral"
                    icon-name="utility:clear"
                    onclick={limparFormulario}
                ></lightning-button>
                <lightning-button
                    label="Criar Task"
                    variant="brand"
                    icon-name="utility:add"
                    onclick={criarTask}
                ></lightning-button>
            </div>

        </div>
    </lightning-card>
</template>
