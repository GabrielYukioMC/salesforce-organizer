<template>
    <!-- Botões -->
    <div class="view-toggle">
        <lightning-button-group>
            <lightning-button
                label="Lista"
                variant={listVariant}
                onclick={showList}
            ></lightning-button>

            <lightning-button
                label="Kanban"
                variant={kanbanVariant}
                onclick={showKanban}
            ></lightning-button>
        </lightning-button-group>
    </div>

    <!-- LISTA -->
    <template if:true={isListView}>
        <lightning-datatable
            key-field="Id"
            data={tarefas}
            columns={columns}
        ></lightning-datatable>
    </template>

    <!-- KANBAN -->
    <template if:true={isKanbanView}>
        <c-tarefas-kanban
            tarefas={tarefas}
            status-options={statusOptions}
        ></c-tarefas-kanban>
    </template>
</template>
