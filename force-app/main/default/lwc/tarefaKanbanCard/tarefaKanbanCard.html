<template>
    <template if:true={tarefa}>
        <div
            class={cardClass}
            draggable="true"
            ondragstart={handleDragStart}
        >
            <strong class="task-name slds-show slds-text-color_default">{tarefa.Name}</strong>

            <div class="task-meta slds-grid slds-wrap slds-m-bottom_xx-small">
                <span class="badge tipo">{tarefa.TipoTarefa__c}</span>
                <span class="badge prioridade">{tarefa.Prioridade__c}</span>
            </div>

            <template if:true={dataEntregaFormatada}>
                <div class="task-date slds-grid slds-grid_vertical-align-center slds-m-top_xx-small">
                    <lightning-icon icon-name="utility:clock" size="xx-small"></lightning-icon>
                    {dataEntregaFormatada}
                </div>
            </template>

            <template if:true={periodoApontamento}>
                <div class="task-date slds-grid slds-grid_vertical-align-center slds-m-top_xx-small">
                    <lightning-icon icon-name="utility:date_time" size="xx-small"></lightning-icon>
                    {periodoApontamento}
                </div>
            </template>

            <template if:true={tarefa.Projeto__r}>
                <div class="task-projeto slds-grid slds-grid_vertical-align-center slds-m-top_xx-small">
                    <lightning-icon icon-name="utility:work_order" size="xx-small"></lightning-icon>
                    <span class="projeto-nome">&nbsp;{tarefa.Projeto__r.Name}</span>
                </div>
            </template>

            <template if:true={isAtrasada}>
                <span class="badge atrasada-badge slds-show_inline-block slds-m-top_xx-small">Atrasada</span>
            </template>

            <template if:true={checklistProgressoCard}>
                <div class="checklist-progresso slds-m-top_xx-small">
                    <lightning-icon icon-name="utility:check" size="xx-small"></lightning-icon>
                    {checklistProgressoCard}
                </div>
            </template>

            <lightning-button-icon
                icon-name="utility:edit"
                variant="bare"
                class="edit-btn slds-is-absolute"
                onclick={abrirModal}
                onmousedown={cancelarDrag}
                alternative-text="Editar tarefa"
            ></lightning-button-icon>
        </div>

        <template if:true={modalAberto}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <lightning-button-icon
                            icon-name="utility:close"
                            variant="bare-inverse"
                            class="slds-modal__close"
                            onclick={fecharModal}
                            alternative-text="Fechar"
                        ></lightning-button-icon>
                        <h2 class="slds-text-heading_medium">Editar Tarefa</h2>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-input
                            label="Título"
                            value={tarefaEditada.Name}
                            data-field="Name"
                            onchange={handleChange}
                        ></lightning-input>

                        <div class="modal-grid">
                            <lightning-combobox
                                label="Status"
                                value={tarefaEditada.Status__c}
                                options={statusOptions}
                                data-field="Status__c"
                                onchange={handleChange}
                            ></lightning-combobox>

                            <lightning-combobox
                                label="Prioridade"
                                value={tarefaEditada.Prioridade__c}
                                options={prioridades}
                                data-field="Prioridade__c"
                                onchange={handleChange}
                            ></lightning-combobox>

                            <lightning-combobox
                                label="Tipo"
                                value={tarefaEditada.TipoTarefa__c}
                                options={tipos}
                                data-field="TipoTarefa__c"
                                onchange={handleChange}
                            ></lightning-combobox>
                        </div>

                        <template if:true={isTipoTrabalho}>
                            <lightning-combobox
                                label="Projeto"
                                value={tarefaEditada.Projeto__c}
                                options={projetosOptions}
                                data-field="Projeto__c"
                                onchange={handleChange}
                                placeholder="Selecione o projeto..."
                            ></lightning-combobox>
                        </template>

                        <lightning-input
                            type="datetime-local"
                            label="Prazo de entrega"
                            value={tarefaEditada.CloseDate__c}
                            data-field="CloseDate__c"
                            onchange={handleChange}
                        ></lightning-input>

                        <div class="apontamento-section">
                            <p class="apontamento-label">Início da Tarefa</p>
                            <div class="modal-grid">
                                <lightning-input
                                    type="date"
                                    label="Data"
                                    value={inicioDataStr}
                                    data-field="InicioTarefa__c"
                                    onchange={handleDataChange}
                                ></lightning-input>
                                <lightning-combobox
                                    label="Hora"
                                    value={inicioHoraStr}
                                    options={horasOptions}
                                    placeholder="Selecione..."
                                    data-field="InicioTarefa__c"
                                    onchange={handleHoraChange}
                                ></lightning-combobox>
                            </div>

                            <p class="apontamento-label">Fim da Tarefa</p>
                            <div class="modal-grid">
                                <lightning-input
                                    type="date"
                                    label="Data"
                                    value={fimDataStr}
                                    data-field="FimTarefa__c"
                                    onchange={handleDataChange}
                                ></lightning-input>
                                <lightning-combobox
                                    label="Hora"
                                    value={fimHoraStr}
                                    options={horasOptions}
                                    placeholder="Selecione..."
                                    data-field="FimTarefa__c"
                                    onchange={handleHoraChange}
                                ></lightning-combobox>
                            </div>
                        </div>

                        <lightning-input-rich-text
                            label="Descrição"
                            value={tarefaEditada.Descricao__c}
                            data-field="Descricao__c"
                            onchange={handleChange}
                        ></lightning-input-rich-text>

                        <!-- Checklist -->
                        <div class="checklist-section">
                            <h3 class="checklist-titulo">Checklist {checklistProgresso}</h3>

                            <template for:each={checklist} for:item="item">
                                <div key={item.id} class="checklist-item">
                                    <lightning-input
                                        type="checkbox"
                                        label={item.texto}
                                        checked={item.feito}
                                        data-id={item.id}
                                        onchange={handleToggleItem}
                                    ></lightning-input>
                                    <lightning-button-icon
                                        icon-name="utility:close"
                                        variant="bare"
                                        size="x-small"
                                        alternative-text="Remover"
                                        data-id={item.id}
                                        onclick={handleRemoveItem}
                                    ></lightning-button-icon>
                                </div>
                            </template>

                            <div class="checklist-add">
                                <lightning-input
                                    label="Novo item"
                                    placeholder="Adicionar item..."
                                    value={novoItemChecklist}
                                    variant="label-hidden"
                                    onchange={handleNovoItemChange}
                                ></lightning-input>
                                <lightning-button
                                    label="Adicionar"
                                    icon-name="utility:add"
                                    onclick={handleAddItem}
                                ></lightning-button>
                            </div>
                        </div>
                    </div>

                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancelar" onclick={fecharModal}></lightning-button>
                        <lightning-button
                            variant="brand"
                            label="Salvar"
                            disabled={salvando}
                            onclick={salvarTarefa}
                        ></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </template>
</template>
