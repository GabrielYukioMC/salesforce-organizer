<template>
    <div class="kanban">
        <template for:each={columns} for:item="col">
            <div
                key={col.status}
                class={col.columnClass}
                data-status={col.status}
                ondragover={allowDrop}
                ondragleave={handleDragLeave}
                ondrop={handleDrop}
            >
                <div class="kanban-col-header">
                    <span class="col-label">{col.label}</span>
                    <span class="col-count">{col.count}</span>
                </div>

                <div class="kanban-col-body">
                    <template if:true={col.tarefas.length}>
                        <template for:each={col.tarefas} for:item="task">
                            <c-tarefa-kanban-card
                                key={task.Id}
                                tarefa={task}
                            ></c-tarefa-kanban-card>
                        </template>
                    </template>

                    <template if:false={col.tarefas.length}>
                        <p class="empty">Nenhuma tarefa</p>
                    </template>
                </div>
            </div>
        </template>
    </div>
</template>
