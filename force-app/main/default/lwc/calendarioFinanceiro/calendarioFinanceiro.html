<template>
    <lightning-card>
        
        <div class="header">

        <!-- Navegação Centralizada -->
        <div class="navegacao">
            <lightning-button-icon 
                icon-name="utility:chevronleft"
                alternative-text="Mês anterior"
                onclick={mesAnterior}
                variant="bare">
            </lightning-button-icon>

            <h2 class="titulo-mes">{mesSelecionado}</h2>

            <lightning-button-icon 
                icon-name="utility:chevronright"
                alternative-text="Próximo mês"
                onclick={proximoMes}
                variant="bare">
            </lightning-button-icon>
        </div>

        <!-- Resumo -->
        <div class="resumo">
            <div class="card-resumo entrada-box">
                <span class="label">Entradas</span>
                <span class="valor">{totalEntradasFormatado}</span>
            </div>

            <div class="card-resumo saida-box">
                <span class="label">Saídas</span>
                <span class="valor">{totalSaidasFormatado}</span>
            </div>

            <div class={classeSaldo}>
                <span class="label">Saldo</span>
                <span class="valor">{saldoFormatado}</span>
            </div>
        </div>

    </div>

        <!-- CALENDÁRIO -->
        <div class="calendar">

            <template for:each={diasSemana} for:item="d">
                <div key={d} class="weekday">{d}</div>
            </template>

            <template for:each={getDiasDoMes} for:item="dia">
               <div key={dia.key} 
                    class="day"
                    data-dia={dia.numero}
                    onclick={abrirModal}>

                    <template if:true={dia.numero}>
                        <div class={dia.cssClass}>{dia.numero}</div>

                        <template if:true={dia.transacoes}>
                            <template for:each={dia.transacoes} for:item="t">
                                <div key={t.Id} class="transacao-wrapper">
                                    <div class={t.cssClass}>
                                        <span class="t-nome">{t.Name}</span>
                                        <span class="t-valor">{t.valorFormatado}</span>
                                        <div class="t-acoes">
                                            <lightning-input
                                                type="checkbox"
                                                label="Pago"
                                                checked={t.Pago__c}
                                                data-id={t.Id}
                                                onchange={handleTogglePago}
                                                variant="label-hidden"
                                                class="t-pago"
                                            ></lightning-input>
                                            <lightning-button-icon
                                                icon-name="utility:edit"
                                                variant="bare"
                                                size="x-small"
                                                alternative-text="Editar"
                                                data-id={t.Id}
                                                onclick={handleAbrirEdicao}
                                            ></lightning-button-icon>
                                            <lightning-button-icon
                                                icon-name="utility:delete"
                                                variant="bare"
                                                size="x-small"
                                                alternative-text="Excluir"
                                                data-id={t.Id}
                                                onclick={handleDeletar}
                                            ></lightning-button-icon>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </template>
                    </template>

                </div>
            </template>

        </div>
    </lightning-card>


    <!-- Modal edição -->
    <template if:true={modalEdicaoAberto}>
    <section class="modal-backdrop">
        <div class="modal">
            <h3>Editar Transação</h3>

            <lightning-input
                label="Nome"
                value={transacaoEditando.Name}
                data-field="Name"
                onchange={handleChangeEdicao}>
            </lightning-input>

            <lightning-combobox
                label="Tipo"
                value={transacaoEditando.Tipo__c}
                options={opcoesTipo}
                data-field="Tipo__c"
                onchange={handleChangeEdicao}>
            </lightning-combobox>

            <lightning-combobox
                label="Categoria"
                value={transacaoEditando.Categoria__c}
                options={opcoesCategoria}
                data-field="Categoria__c"
                onchange={handleChangeEdicao}>
            </lightning-combobox>

            <lightning-input
                label="Valor"
                type="number"
                value={transacaoEditando.Valor__c}
                data-field="Valor__c"
                onchange={handleChangeEdicao}>
            </lightning-input>

            <lightning-input
                type="toggle"
                label="Pago"
                checked={transacaoEditando.Pago__c}
                data-field="Pago__c"
                onchange={handleChangeEdicaoPago}>
            </lightning-input>

            <div class="modal-actions">
                <lightning-button label="Cancelar" onclick={fecharModalEdicao}></lightning-button>
                <lightning-button variant="brand" label="Salvar" disabled={salvandoEdicao} onclick={handleSalvarEdicao}></lightning-button>
            </div>
        </div>
    </section>
    </template>

    <template if:true={modalAberto}>
    <section class="modal-backdrop">
        <div class="modal">

            <h3>Nova Transação - Dia {diaSelecionado}</h3>

            <!-- Tipo -->
            <lightning-combobox
                label="Tipo"
                value={saidaCad.tipoTransacao}
                options={opcoesTipo}
                data-field="tipoTransacao"
                onchange={handleChange}>
            </lightning-combobox>

            <lightning-input
                label="Nome"
                value={saidaCad.nomeSaida}
                data-field="nomeSaida"
                onchange={handleChange}>
            </lightning-input>

            <lightning-input
    label="Valor"
    type="text"
    value={saidaCad.valorFormatado}
    data-field="valorFormatado"
    onchange={handleChange}>
</lightning-input>
            <lightning-combobox
    label="Categoria"
    value={saidaCad.tipoSaida}
    options={opcoesCategoria}
    data-field="tipoSaida"
    onchange={handleChange}>
</lightning-combobox>

<!-- Recorrente -->
<lightning-input
    type="toggle"
    label="Transação Recorrente"
    checked={saidaCad.recorrente}
    data-field="recorrente"
    onchange={handleToggle}>
</lightning-input>

<!-- Frequência aparece apenas se for recorrente -->
<template if:true={saidaCad.recorrente}>
    <lightning-combobox
        label="Frequência"
        value={saidaCad.frequencia}
        options={opcoesFrequencia}
        data-field="frequencia"
        onchange={handleChange}>
    </lightning-combobox>
</template>

            <div class="modal-actions">
                <lightning-button label="Cancelar" onclick={fecharModal}></lightning-button>
                <lightning-button variant="brand" label="Salvar" onclick={salvarTransacao}></lightning-button>
            </div>

        </div>
    </section>
</template>
</template>
