name: Salesforce validation and deploy

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: salesforce-${{ github.event_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  salesforce-validation:
    name: Validate PR changes
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      COVERAGE_THRESHOLD: "80"
      TEST_CLASSES_FILE: .github/salesforce-pr-test-classes.txt
      SF_ORG_ALIAS: main
      SF_USE_PROGRESS_BAR: "false"
      SF_DISABLE_TELEMETRY: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare readable PR validation scope
        id: pr_scope
        run: |
          mkdir -p deploy-results
          node scripts/ci/prepare-pr-validation.mjs \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --source-root force-app \
            --tests-file "$TEST_CLASSES_FILE" \
            --out-dir deploy-results \
            --operation validate

      - name: Install Salesforce CLI
        if: steps.pr_scope.outputs.has_deployable_changes == 'true'
        run: npm install --global @salesforce/cli

      - name: Authenticate target org
        id: auth_pr
        if: steps.pr_scope.outputs.has_deployable_changes == 'true'
        shell: bash
        env:
          SF_MAIN_AUTH_URL: ${{ secrets.SF_MAIN_AUTH_URL }}
        run: |
          if [ -z "$SF_MAIN_AUTH_URL" ]; then
            {
              echo "## Autenticacao Salesforce"
              echo
              echo "Nao encontrei o secret \`SF_MAIN_AUTH_URL\` neste repositorio."
              echo
              echo "Configure esse secret em Settings > Secrets and variables > Actions usando o SFDX Auth URL da org alvo."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=Missing secret::Configure the SF_MAIN_AUTH_URL repository secret with the target org SFDX auth URL."
            exit 1
          fi

          auth_file="${RUNNER_TEMP}/sf-main-auth-url.txt"
          printf '%s' "$SF_MAIN_AUTH_URL" > "$auth_file"
          sf org login sfdx-url --sfdx-url-file "$auth_file" --alias "$SF_ORG_ALIAS"

      - name: Validate only the files changed in this PR
        id: validate_deploy
        if: steps.pr_scope.outputs.has_deployable_changes == 'true'
        shell: bash
        run: |
          mapfile -t source_paths < deploy-results/pr-source-paths.txt
          mapfile -t test_classes < deploy-results/pr-test-classes.txt

          deploy_args=()
          for source_path in "${source_paths[@]}"; do
            deploy_args+=(--source-dir "$source_path")
          done

          test_args=()
          for test_class in "${test_classes[@]}"; do
            test_args+=(--tests "$test_class")
          done

          sf project deploy validate \
            "${deploy_args[@]}" \
            --target-org "$SF_ORG_ALIAS" \
            --test-level RunSpecifiedTests \
            "${test_args[@]}" \
            --coverage-formatters json-summary \
            --junit \
            --results-dir deploy-results \
            --wait 120 \
            --api-version 65.0

      - name: Check 80 percent coverage for PR Apex classes
        id: coverage_gate
        if: steps.pr_scope.outputs.has_apex_targets == 'true'
        run: node scripts/ci/check-apex-coverage.mjs deploy-results "$COVERAGE_THRESHOLD" deploy-results/pr-apex-targets.txt

      - name: Build readable validate summary
        if: always()
        run: |
          node scripts/ci/summarize-salesforce-job.mjs \
            --operation validate \
            --out-dir deploy-results \
            --threshold "$COVERAGE_THRESHOLD" \
            --auth-status "${{ steps.auth_pr.outcome }}" \
            --salesforce-status "${{ steps.validate_deploy.outcome }}" \
            --coverage-status "${{ steps.coverage_gate.outcome }}"

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: salesforce-validation-results
          path: deploy-results
          if-no-files-found: ignore

  salesforce-deploy:
    name: Deploy approved main changes
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      COVERAGE_THRESHOLD: "80"
      TEST_CLASSES_FILE: .github/salesforce-pr-test-classes.txt
      SF_ORG_ALIAS: main
      SF_USE_PROGRESS_BAR: "false"
      SF_DISABLE_TELEMETRY: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare readable deploy scope
        id: deploy_scope
        run: |
          mkdir -p deploy-results
          node scripts/ci/prepare-pr-validation.mjs \
            --base "${{ github.event.before }}" \
            --head "${{ github.sha }}" \
            --source-root force-app \
            --tests-file "$TEST_CLASSES_FILE" \
            --out-dir deploy-results \
            --operation deploy

      - name: Install Salesforce CLI
        if: steps.deploy_scope.outputs.has_deployable_changes == 'true'
        run: npm install --global @salesforce/cli

      - name: Authenticate target org
        id: auth_deploy
        if: steps.deploy_scope.outputs.has_deployable_changes == 'true'
        shell: bash
        env:
          SF_MAIN_AUTH_URL: ${{ secrets.SF_MAIN_AUTH_URL }}
        run: |
          if [ -z "$SF_MAIN_AUTH_URL" ]; then
            {
              echo "## Autenticacao Salesforce"
              echo
              echo "Nao encontrei o secret \`SF_MAIN_AUTH_URL\` neste repositorio."
              echo
              echo "Configure esse secret em Settings > Secrets and variables > Actions usando o SFDX Auth URL da org alvo."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=Missing secret::Configure the SF_MAIN_AUTH_URL repository secret with the target org SFDX auth URL."
            exit 1
          fi

          auth_file="${RUNNER_TEMP}/sf-main-auth-url.txt"
          printf '%s' "$SF_MAIN_AUTH_URL" > "$auth_file"
          sf org login sfdx-url --sfdx-url-file "$auth_file" --alias "$SF_ORG_ALIAS"

      - name: Deploy only the files changed on main
        id: deploy_start
        if: steps.deploy_scope.outputs.has_deployable_changes == 'true'
        shell: bash
        run: |
          mapfile -t source_paths < deploy-results/pr-source-paths.txt
          mapfile -t test_classes < deploy-results/pr-test-classes.txt

          deploy_args=()
          for source_path in "${source_paths[@]}"; do
            deploy_args+=(--source-dir "$source_path")
          done

          test_args=()
          for test_class in "${test_classes[@]}"; do
            test_args+=(--tests "$test_class")
          done

          sf project deploy start \
            "${deploy_args[@]}" \
            --target-org "$SF_ORG_ALIAS" \
            --test-level RunSpecifiedTests \
            "${test_args[@]}" \
            --coverage-formatters json-summary \
            --junit \
            --results-dir deploy-results \
            --wait 120 \
            --api-version 65.0

      - name: Confirm 80 percent coverage for deployed Apex classes
        id: deploy_coverage_gate
        if: steps.deploy_scope.outputs.has_apex_targets == 'true'
        run: node scripts/ci/check-apex-coverage.mjs deploy-results "$COVERAGE_THRESHOLD" deploy-results/pr-apex-targets.txt

      - name: Build readable deploy summary
        if: always()
        run: |
          node scripts/ci/summarize-salesforce-job.mjs \
            --operation deploy \
            --out-dir deploy-results \
            --threshold "$COVERAGE_THRESHOLD" \
            --auth-status "${{ steps.auth_deploy.outcome }}" \
            --salesforce-status "${{ steps.deploy_start.outcome }}" \
            --coverage-status "${{ steps.deploy_coverage_gate.outcome }}"

      - name: Upload deploy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: salesforce-deploy-results
          path: deploy-results
          if-no-files-found: ignore
